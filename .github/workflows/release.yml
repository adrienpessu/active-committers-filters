name: Build and Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Get dependencies
      run: go mod download

    - name: Make build script executable
      run: chmod +x build.sh

    - name: Build all platforms using build script
      run: ./build.sh

    - name: Create archives
      run: |
        cd build
        
        # Create zip for Windows
        zip active-commiters-filters-windows-amd64.zip active-commiters-filters-windows-amd64.exe
        
        # Create tar.gz for macOS and Linux
        tar -czf active-commiters-filters-darwin-arm64.tar.gz active-commiters-filters-darwin-arm64
        tar -czf active-commiters-filters-darwin-amd64.tar.gz active-commiters-filters-darwin-amd64
        tar -czf active-commiters-filters-linux-amd64.tar.gz active-commiters-filters-linux-amd64
        tar -czf active-commiters-filters-linux-arm64.tar.gz active-commiters-filters-linux-arm64

    - name: Upload all release assets
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release upload ${{ github.event.release.tag_name }} \
          build/active-commiters-filters-windows-amd64.zip \
          build/active-commiters-filters-darwin-arm64.tar.gz \
          build/active-commiters-filters-darwin-amd64.tar.gz \
          build/active-commiters-filters-linux-amd64.tar.gz \
          build/active-commiters-filters-linux-arm64.tar.gz \
          --clobber